<script>
// Конфигурация Google Sheets для проверки email
const EMAIL_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
const EMAIL_SHEET_NAME = '1';
const EMAIL_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';

// Основная конфигурация для данных
const API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
const SPREADSHEET_ID = '1v-R394u6sKzSdvmkh9qsbqhfkNZEi5lIXwo8BdT_lhQ';
const MANUALS_RANGE = 'MANUALS!A:Z';
const MANUAL_RANGE = 'MANUAL!A:B';

// Диапазоны для листов с изображениями
const STORE_RANGE = 'STORE!A:D';
const BB_RANGE = 'BB!A:D';
const KH_RANGE = 'KH!A:D';
const SKYMALL_RANGE = 'SKYMALL!A:D';

let manualsData = [];
let stockData = {};
let searchResults = [];
let currentIndex = 0;
let currentUser = null;
let currentSiteUrl = window.location.href;

// Убираем параметры из URL для точного сравнения
currentSiteUrl = currentSiteUrl.split('?')[0].split('#')[0];

// Элементы DOM
const authPage = document.getElementById("authPage");
const mainHeader = document.getElementById("mainHeader");
const manualContainer = document.getElementById("manualContainer");
const searchInput = document.getElementById("searchInput");
const searchNav = document.getElementById("searchNav");
const loadingScreen = document.getElementById("loadingScreen");
const imageModal = document.getElementById("imageModal");
const modalImage = document.getElementById("modalImage");
const userEmail = document.getElementById("userEmail");
const shopFabLeft = document.querySelector(".shop-fab-left");
const shopFabRight = document.querySelector(".shop-fab-right");

// Загружаем сохраненную сессию при старте
window.onload = function() {
  const savedUser = localStorage.getItem('manualUser');
  if (savedUser) {
    try {
      currentUser = JSON.parse(savedUser);
      checkUserAccess(currentUser.email);
    } catch (e) {
      showAuthPage();
    }
  } else {
    setTimeout(() => {
      loadingScreen.classList.add('fade-out');
      setTimeout(() => {
        showAuthPage();
      }, 500);
    }, 1500);
  }
};

function showAuthPage() {
  authPage.style.display = "flex";
  mainHeader.style.display = "none";
  manualContainer.style.display = "none";
  shopFabLeft.style.display = "none";
  shopFabRight.style.display = "none";
  searchNav.style.display = "none";
}

function showMainContent() {
  authPage.style.display = "none";
  mainHeader.style.display = "flex";
  manualContainer.style.display = "block";
  shopFabLeft.style.display = "flex";
  shopFabRight.style.display = "flex";
  
  // Загружаем данные
  loadFromGoogleSheets();
}

// Обработчик успешного входа через Google
function handleGoogleSignIn(response) {
  // Декодируем JWT токен
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  
  currentUser = {
    email: payload.email,
    name: payload.name,
    picture: payload.picture
  };
  
  // Проверяем доступ пользователя
  checkUserAccess(payload.email);
}

async function checkUserAccess(email) {
  try {
    // Загружаем данные из таблицы с email
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${EMAIL_SPREADSHEET_ID}/values/${EMAIL_SHEET_NAME}?key=${EMAIL_API_KEY}`;
    const response = await fetch(url);
    const data = await response.json();
    
    if (!data.values) {
      showAccessDenied("Ошибка загрузки данных");
      return;
    }
    
    // Ищем email в колонке А (индекс 0)
    const emailColumnIndex = 0;
    let found = false;
    let hasSiteLink = false;
    
    console.log("Проверка доступа для email:", email);
    console.log("Текущий URL сайта:", currentSiteUrl);
    
    for (let i = 0; i < data.values.length; i++) {
      const row = data.values[i];
      const rowEmail = row[emailColumnIndex] ? row[emailColumnIndex].toLowerCase().trim() : '';
      
      if (rowEmail === email.toLowerCase()) {
        found = true;
        console.log("Email найден в строке", i + 1);
        
        // Проверяем все колонки начиная с B (индекс 1)
        for (let j = 1; j < row.length; j++) {
          if (row[j]) {
            const cellValue = row[j].trim();
            if (cellValue.includes(currentSiteUrl)) {
              hasSiteLink = true;
              console.log("Найдена ссылка на сайт в колонке", j + 1);
              break;
            }
          }
        }
        break;
      }
    }
    
    if (found && hasSiteLink) {
      // Сохраняем сессию
      localStorage.setItem('manualUser', JSON.stringify(currentUser));
      userEmail.textContent = currentUser.email;
      
      // Показываем основной контент
      showMainContent();
    } else {
      let message = found ? 
        "Ваш email не имеет доступа к этому разделу" : 
        "Email не найден в базе данных";
      showAccessDenied(message);
    }
    
  } catch (error) {
    console.error('Ошибка проверки доступа:', error);
    showAccessDenied("Ошибка при проверке доступа");
  }
}

function showAccessDenied(message) {
  authPage.innerHTML = `
    <div class="access-denied">
      <i class="fa-solid fa-lock"></i>
      <h2>Доступ запрещен</h2>
      <p>${message}</p>
      <button onclick="logout()">Попробовать снова</button>
    </div>
  `;
}

function logout() {
  // Очищаем сохраненную сессию
  localStorage.removeItem('manualUser');
  currentUser = null;
  
  // Перезагружаем страницу
  window.location.reload();
}

function openImageModal(imageUrl) {
  if (imageUrl && imageUrl.trim() !== '') {
    modalImage.src = imageUrl;
    imageModal.style.display = "block";
  }
}

function closeImageModal() {
  imageModal.style.display = "none";
}

// Закрытие модального окна по ESC
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && imageModal.style.display === "block") {
    closeImageModal();
  }
});

function openShopSearch() {
  const partNumber = prompt("Введите номер детали:", "");
  if (partNumber !== null && partNumber.trim() !== "") {
    const cleanNumber = partNumber.replace(/-/g, '');
    const form = document.createElement('form');
    form.method = 'get';
    form.action = 'https://shop.bowlingvision.com/catalogue/results.aspx';
    form.style.display = 'none';
    const input = document.createElement('input');
    input.type = 'text';
    input.name = 'search';
    input.value = cleanNumber;
    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
    setTimeout(() => document.body.removeChild(form), 1000);
  }
}

let lastTouchEnd = 0;
document.addEventListener("touchend", function (event) {
  const now = new Date().getTime();
  if (now - lastTouchEnd <= 300) { event.preventDefault(); }
  lastTouchEnd = now;
}, false);

    const manualResponse = await fetch(manualUrl);

async function loadStockData() {
  try {
    // Загружаем данные из листа STORE
    const storeUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${STORE_RANGE}?key=${API_KEY}`;
    const storeResponse = await fetch(storeUrl);
    const storeData = await storeResponse.json();
    
    // Загружаем данные из листа BB
    const bbUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${BB_RANGE}?key=${API_KEY}`;
    const bbResponse = await fetch(bbUrl);
    const bbData = await bbResponse.json();
    
    // Загружаем данные из листа KH
    const khUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${KH_RANGE}?key=${API_KEY}`;
    const khResponse = await fetch(khUrl);
    const khData = await khResponse.json();
    
    // Загружаем данные из листа SKYMALL
    const skymallUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SKYMALL_RANGE}?key=${API_KEY}`;
    const skymallResponse = await fetch(skymallUrl);
    const skymallData = await skymallResponse.json();
    
    // Инициализируем stockData
    stockData = {};
    
    // Обрабатываем данные из каждого листа
    processStockSheet(storeData.values, 'STORE');
    processStockSheet(bbData.values, 'BB');
    processStockSheet(khData.values, 'KH');
    processStockSheet(skymallData.values, 'SKYMALL');
    
  } catch (error) {
    console.error('Ошибка загрузки данных складов:', error);
    // В случае ошибки создаем демо-данные
    generateDemoStockData();
  }
}

function processStockSheet(rows, sheetName) {
  if (!rows || rows.length === 0) return;
  
  // Первая строка - заголовки, пропускаем её
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row[0]) continue; // Пропускаем пустые строки
    
    const partNumber = row[0].trim(); // Номер детали (столбец A)
    const quantity = parseInt(row[1]) || 0; // Количество (столбец B)
    const imageUrl = row[3] || ''; // Изображение (столбец D)
    
    // Создаем запись для детали, если её еще нет
    if (!stockData[partNumber]) {
      stockData[partNumber] = {
        BB: { quantity: 0, location: '', image: '' },
        KH: { quantity: 0, location: '', image: '' },
        SKYMALL: { quantity: 0, location: '', image: '' },
        STORE: { quantity: 0, location: '', image: '' }
      };
    }
    
    // Заполняем данные для конкретного листа
    stockData[partNumber][sheetName] = {
      quantity: quantity,
      location: row[2] || '', // Столбец C - локация (если есть)
      image: imageUrl
    };
  }
}

function generateDemoStockData() {
  // Собираем все уникальные номера деталей
  const allParts = new Set();
  manualsData.forEach(manual => {
    manual.parts.forEach(part => {
      // Парсим составные детали
      if (part.includes('(') && part.includes(')')) {
        const matches = part.match(/\(([^)]+)\)\s+([\d-]+)/g);
        if (matches) {
          matches.forEach(match => {
            const number = match.split(' ').pop();
            allParts.add(number);
          });
        } else {
          allParts.add(part);
        }
      } else {
        allParts.add(part);
      }
    });
  });
  
  // Создаем демо-данные для каждого клуба
  allParts.forEach(part => {
    stockData[part] = {
      BB: { quantity: Math.floor(Math.random() * 5), location: 'Склад 1', image: '' },
      KH: { quantity: Math.floor(Math.random() * 3), location: 'Склад 2', image: '' },
      SKYMALL: { quantity: Math.floor(Math.random() * 4), location: 'Склад 3', image: '' },
      STORE: { quantity: Math.floor(Math.random() * 2), location: 'Магазин', image: '' }
    };
  });
}

function processSheetData(manualsRows, manualRows) {
  manualsData = [];
  
  if (!manualsRows || manualsRows.length === 0) return;
  
  // Первая строка - заголовки, пропускаем её
  const headers = manualsRows[0];
  
  // Обрабатываем каждую строку начиная со второй
  for (let i = 1; i < manualsRows.length; i++) {
    const row = manualsRows[i];
    if (!row[0]) continue; // Пропускаем пустые строки
    
    const manualName = row[0]; // Название мануала (столбец A)
    const imageUrl = row[1] || ''; // Ссылка на картинку (столбец B)
    
    // Собираем все детали, начиная со столбца C (индекс 2)
    const parts = [];
    for (let j = 2; j < row.length; j++) {
      if (row[j] && row[j].trim() !== '') {
        parts.push(row[j].trim());
      }
    }
    
    // Добавляем мануал в массив
    manualsData.push({
      name: manualName,
      image: imageUrl,
      parts: parts
    });
  }
  
  // Обрабатываем данные из листа MANUAL (PDF ссылки)
  if (manualRows && manualRows.length > 0) {
    // Первая строка - заголовки, пропускаем её
    for (let i = 1; i < manualRows.length; i++) {
      const row = manualRows[i];
      if (!row[0]) continue;
      
      const manualName = row[0]; // Название мануала
      const pdfUrl = row[1] || ''; // Ссылка на PDF
      
      // Находим соответствующий мануал и добавляем PDF ссылку
      const manual = manualsData.find(m => m.name === manualName);
      if (manual) {
        manual.pdf = pdfUrl;
      }
    }
  }
}

function parseCompositeParts(partString) {
  const result = [];
  const regex = /\(([^)]+)\)\s+([\d-]+)/g;
  let match;
  while ((match = regex.exec(partString)) !== null) {
    result.push({ code: match[1].trim(), number: match[2].trim() });
  }
  return result;
}

function extractSingleCode(partString) {
  const regex = /^\(([^)]+)\)\s+([\d-]+)$/;
  const match = partString.match(regex);
  if (match) {
    return { code: match[1].trim(), number: match[2].trim() };
  }
  return null;
}

function isCompositePart(partString) {
  const matches = partString.match(/\([^)]+\)\s+[\d-]+/g);
  return matches && matches.length > 1;
}

function renderManualGroups() {
  manualContainer.innerHTML = "";
  
  // Получаем уникальные имена мануалов
  const uniqueNames = [...new Set(manualsData.map(m => m.name))];
  
  uniqueNames.forEach(name => {
    const b = document.createElement("button");
    b.className = "start-btn";
    const icon = document.createElement("i");
    icon.className = "fa-solid fa-book-open";
    const span = document.createElement("span");
    span.textContent = name;
    b.appendChild(icon);
    b.appendChild(span);
    b.onclick = () => renderManualsByName(name);
    manualContainer.appendChild(b);
  });
  
  searchInput.value = "";
  searchResults = [];
  currentIndex = 0;
  searchNav.style.display = "none";
}

function renderManualsByName(name) {
  manualContainer.innerHTML = "";
  
  // Находим текущий мануал в данных
  const currentManual = manualsData.find(m => m.name === name);
  
  // Кнопка MANUAL PDF с иконкой PDF
  const pdfButton = document.createElement("div");
  pdfButton.className = "pdf-top-button";
  pdfButton.innerHTML = '<i class="fa-solid fa-file-pdf"></i> MANUAL PDF';
  
  pdfButton.onclick = () => {
    if (currentManual && currentManual.pdf) {
      window.open(currentManual.pdf, '_blank');
    } else {
      alert('PDF для этого мануала не найден');
    }
  };
  
  manualContainer.appendChild(pdfButton);
  
  manualsData.filter(m => m.name === name).forEach(manual => {
    const block = document.createElement("div");
    block.className = "block";
    block.innerHTML = `
      <div class="manual-label">${manual.name}</div>
      <img class="top-image clickable-image" src="${manual.image}" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
      <div class="buttons-container"></div>
    `;
    const cont = block.querySelector(".buttons-container");
    const image = block.querySelector(".clickable-image");
    image.onclick = () => cont.style.display = cont.style.display === "flex" ? "none" : "flex";

    manual.parts.forEach((part, index) => {
      const singleCode = extractSingleCode(part);
      if (singleCode) {
        createPartButton(cont, singleCode.number, singleCode.code, image);
      } else if (isCompositePart(part)) {
        const parsedParts = parseCompositeParts(part);
        parsedParts.forEach((parsedPart) => {
          createPartButton(cont, parsedPart.number, parsedPart.code, image);
        });
      } else {
        createPartButton(cont, part, (index + 1).toString(), image);
      }
    });
    
    manualContainer.appendChild(block);
  });
}

function createPartButton(container, partNumber, label, image) {
  const btn = document.createElement("div");
  btn.className = "btn";
  btn.innerHTML = `<span>${label}</span><span class="detail-number">${partNumber}</span>`;
  
  btn.onclick = (e) => {
    const targetDetail = e.target.closest(".detail-number");
    if (targetDetail) {
      e.stopPropagation();
      const originalText = targetDetail.textContent;
      navigator.clipboard.writeText(originalText).then(() => {
        targetDetail.textContent = "Скопировано!";
        setTimeout(() => targetDetail.textContent = originalText, 1200);
      });
      return;
    }
    toggleDetail(btn);
    if (image) {
      image.classList.add("highlight-image");
      setTimeout(() => image.classList.remove("highlight-image"), 800);
    }
  };
  container.appendChild(btn);
}

function toggleDetail(btn) {
  const nextEl = btn.nextElementSibling;
  if (nextEl && nextEl.classList.contains("detail-info")) {
    nextEl.remove(); 
    btn.classList.remove("active-detail");
    return;
  }
  const container = btn.parentElement;
  container.querySelectorAll(".detail-info").forEach(el => el.remove());
  container.querySelectorAll(".btn").forEach(b => b.classList.remove("active-detail"));

  const part = btn.querySelector(".detail-number").textContent;
  const partData = stockData[part];
  
  const info = document.createElement("div");
  info.className = "detail-info";
  
  let clubDataHtml = "";
  ["BB", "KH", "SKYMALL", "STORE"].forEach(club => {
    const clubInfo = partData?.[club] || { quantity: 0, location: '', image: '' };
    const count = clubInfo.quantity || 0;
    const hasImage = clubInfo.image && clubInfo.image.trim() !== '';
    
    clubDataHtml += `
      <div class="club-row ${hasImage ? 'has-image' : ''}" 
           onclick="handleClubClick('${club}', '${part}', event)"
           data-club="${club}"
           data-part="${part}">
        <span class="club-name">${club}</span>
        <div class="club-info">
          <span class="club-quantity ${count === 0 ? 'count-zero' : 'count-positive'}">${count} шт.</span>
          ${hasImage ? '<i class="fa-solid fa-image club-image-icon" title="Нажмите чтобы увидеть изображение"></i>' : ''}
        </div>
      </div>
    `;
  });
  
  info.innerHTML = clubDataHtml;
  btn.after(info);
  btn.classList.add("active-detail");
  setTimeout(() => info.classList.add("open"), 10);
}

// Обработчик клика по клубу
function handleClubClick(club, part, event) {
  event.stopPropagation(); // Предотвращаем всплытие события
  
  const partData = stockData[part];
  if (partData && partData[club] && partData[club].image) {
    const imageUrl = partData[club].image;
    if (imageUrl && imageUrl.trim() !== '') {
      openImageModal(imageUrl);
    }
  }
}

function clearSearch() {
  searchInput.value = "";
  searchResults = [];
  currentIndex = 0;
  document.querySelectorAll(".search-highlight,.active-highlight").forEach(el => 
    el.classList.remove("search-highlight", "active-highlight")
  );
  renderManualGroups();
  searchNav.style.display = "none";
}

searchInput.oninput = e => {
  const v = e.target.value.trim();
  searchResults = []; 
  currentIndex = 0;
  document.querySelectorAll(".search-highlight,.active-highlight").forEach(el => 
    el.classList.remove("search-highlight", "active-highlight")
  );
  if (!v) { renderManualGroups(); return; }
  searchNav.style.display = "flex";
  
  manualsData.forEach(m => {
    let hasMatch = false;
    const checkPart = (part) => {
      const singleCode = extractSingleCode(part);
      if (singleCode && singleCode.number.includes(v)) return true;
      if (isCompositePart(part)) {
        return parseCompositeParts(part).some(p => p.number.includes(v));
      }
      return part.includes(v);
    };
    
    if (m.parts.some(checkPart)) {
      hasMatch = true;
      renderManualsByName(m.name);
      setTimeout(() => {
        document.querySelectorAll(".detail-number").forEach(el => {
          if (el.textContent.includes(v)) {
            el.classList.add("search-highlight");
            el.parentElement.parentElement.style.display = "flex";
            searchResults.push(el);
          }
        });
        if (searchResults[0]) {
          searchResults[0].classList.add("active-highlight");
          searchResults[0].scrollIntoView({behavior: "smooth", block: "center"});
        }
      }, 100);
    }
  });
};

function nextResult() {
  if (!searchResults.length) return;
  searchResults[currentIndex].classList.remove("active-highlight");
  currentIndex = (currentIndex + 1) % searchResults.length;
  searchResults[currentIndex].classList.add("active-highlight");
  searchResults[currentIndex].scrollIntoView({behavior: "smooth", block: "center"});
}

function prevResult() {
  if (!searchResults.length) return;
  searchResults[currentIndex].classList.remove("active-highlight");
  currentIndex = (currentIndex - 1 + searchResults.length) % searchResults.length;
  searchResults[currentIndex].classList.add("active-highlight");
  searchResults[currentIndex].scrollIntoView({behavior: "smooth", block: "center"});
}
